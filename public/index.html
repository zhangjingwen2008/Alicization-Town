<!DOCTYPE html>
<html>
<head>
  <title>⚔️ Alicization Town</title>
  <style>
    /* 全局背景设为深色 */
    body { 
      background-color: #fdfcf0;; 
      color:  #4a3728; 
      text-align: center; 
      font-family: 'Arial', sans-serif;  
      margin: 0; 
      padding: 20px; 
    }
    h1 { margin-bottom: 5px; text-shadow: 0 0 10px #e97645; }
    
    /* 画布容器，用来定位按钮 */
    #game-container {
      position: relative;
      display: inline-block;
      margin-top: 10px;
    }

    /* 游戏画布（硬边缘像素渲染） */
    canvas { 
      background-color: #a4d460; /* 游戏画布背景设为亮绿色 */
      border: 6px solid #d2b48c; /* 像木框一样的边框 */
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(15, 52, 96, 0.8);
      image-rendering: pixelated; /* 保证像素不模糊 */
    }

    /* 🎮 像素风音乐按钮 CSS */
    .pixel-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      background-color: #8ecf7e; /* 柔和的草绿色 */
      border: 3px solid #5a9e4d;
      color: white;
      border-radius: 6px;
      box-shadow: 0 4px 0 #5a9e4d; /* 简单的扁平化按钮 */
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      font-size: 14px;
      padding: 8px 12px;
      cursor: pointer;
      text-transform: uppercase;
      outline: none;
      transition: all 0.1s;
    }
    /* 按钮按下时的凹陷效果 */
    .pixel-btn:active {
      box-shadow: 0 0 0 #5a9e4d;
      transform: translateY(2px);
    }
  </style>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <h1>🏰  Alicization Town V0.1.0</h1>
  
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <!-- 音乐开关按钮 -->
    <button id="bgmBtn" class="pixel-btn" onclick="toggleMusic()">🔇 开启音乐</button>
  </div>

  <!-- 隐藏的音频标签 -->
  <audio id="bgm" src="./assets/musics/36-Village.ogg" loop></audio>

  <script>
    const socket = io();
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const TILE_SIZE = 40; // 小镇的格子大小
    let players = {};

    // ==========================================
    // 🎵 音乐控制逻辑
    // ==========================================
    const bgm = document.getElementById('bgm');
    const bgmBtn = document.getElementById('bgmBtn');
    let isMusicPlaying = false;

    function toggleMusic() {
      if (isMusicPlaying) {
        bgm.pause();
        bgmBtn.innerText = '🔇 开启音乐';
        bgmBtn.style.backgroundColor = '#95a5a6'; // 关掉时变灰
      } else {
        bgm.play();
        bgmBtn.innerText = '🔊 音乐播放中';
        bgmBtn.style.backgroundColor = '#f1c40f'; // 播放时变亮
      }
      isMusicPlaying = !isMusicPlaying;
    }

    // ==========================================
    // 🎨 素材加载与裁剪 (Tileset 处理)
    // ==========================================
    
    // 1. 处理复杂的地形图 (Tileset)
    const tilesetImage = new Image();
    tilesetImage.src = 'assets/TilesetField.png'; // 确保你把上传的第一张图存为了这个名字
    let grassPattern = null;

    tilesetImage.onload = () => {
      // 魔法：创建一个不可见的“迷你画布”，只装 1 个草地格子
      const offscreen = document.createElement('canvas');
      offscreen.width = 16;
      offscreen.height = 16;
      const offCtx = offscreen.getContext('2d');

      // 从你的大 Tileset 中抠出一块纯色的草地
      // 参数：源图, 原图抠图X, 原图抠图Y, 抠图宽, 抠图高, 目标X, 目标Y, 目标宽, 目标高
      // 坐标 (16, 16) 通常是 Ninja 素材包里纯色草地的位置。你可以修改这两个数字来换地砖！
      const TILE_X = 16; 
      const TILE_Y = 16; 
      
      offCtx.drawImage(tilesetImage, TILE_X, TILE_Y, 16, 16, 0, 0, 16, 16);

      // 将抠出来的 16x16 小草地，做成无限平铺的纹理
      grassPattern = ctx.createPattern(offscreen, 'repeat');
      draw();
    };

    // 2. 加载角色精灵图
    const playerImage = new Image();
    playerImage.src = 'assets/player.png';
    let playerLoaded = false;
    playerImage.onload = () => { playerLoaded = true; draw(); };

    // 人物尺寸参数 (Ninja 包标准是 16x16)
    const SPRITE_W = 16; 
    const SPRITE_H = 16;

    const DIRECTION_MAP = {
      'S': 0, // 朝下
      'N': 1, // 朝上
      'W': 2, // 朝左
      'E': 3  // 朝右
    };

    // ==========================================
    // 📡 网络与渲染
    // ==========================================
    socket.on('stateUpdate', (serverPlayers) => {
      players = serverPlayers;
      draw();
    });

    function draw() {
      // 1. 画背景 (高级平铺)
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (grassPattern) {
        ctx.save();
        // 因为 16x16 的草地太小了，我们将整个背景放大 2.5 倍
        ctx.scale(2.5, 2.5); 
        ctx.fillStyle = grassPattern;
        // 注意：因为画布放大了 2.5 倍，填充范围要除以 2.5
        ctx.fillRect(0, 0, canvas.width / 2.5, canvas.height / 2.5);
        ctx.restore();
      }

      // 2. 画所有玩家
      for (const id in players) {
        const p = players[id];
        const screenX = p.x * TILE_SIZE;
        const screenY = p.y * TILE_SIZE;

        if (playerLoaded) {
          const dir = (p.lastDirection || 'S').toUpperCase();
          let row = DIRECTION_MAP[dir] ?? 0;
          let col = 1;

          // 安全校验
          if (row * SPRITE_H >= playerImage.height) row = 0;
          if (col * SPRITE_W >= playerImage.width) col = 0;

          // 放大人物 (拉大到 40 像素左右)
          ctx.drawImage(
            playerImage, 
            col * SPRITE_W, row * SPRITE_H, SPRITE_W, SPRITE_H, 
            screenX, screenY - 15, TILE_SIZE * 1.5, TILE_SIZE * 1.5   
          );
        }

        // 3. 画名字
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        const textWidth = ctx.measureText(p.name).width;
        ctx.fillRect(screenX + TILE_SIZE/2 - textWidth/2 - 4, screenY - 20, textWidth + 8, 16);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(p.name, screenX + TILE_SIZE/2, screenY - 8);

        // 4. 画聊天气泡
        if (p.message) {
          ctx.fillStyle = 'white';
          ctx.beginPath();
          ctx.roundRect(screenX - 20, screenY - 60, 140, 35, 8);
          ctx.fill();
          ctx.strokeStyle = '#ccc';
          ctx.stroke();
          
          ctx.fillStyle = '#333';
          ctx.font = '12px Arial';
          ctx.textAlign = 'left';
          let displayMsg = p.message.length > 10 ? p.message.substring(0, 10) + '...' : p.message;
          ctx.fillText(displayMsg, screenX - 10, screenY - 38);
        }
      }
    }
  </script>
</body>
</html>
