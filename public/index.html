<!-- public/index.html - 前端电视机 -->
<!DOCTYPE html>
<html>
<head>
  <title>⚔️ Alicization Town</title>
  <style>
    body { background-color: #2c3e50; color: white; text-align: center; font-family: sans-serif; }
    canvas { background-color: #78e08f; border: 4px solid #34495e; margin-top: 20px; }
  </style>
  <!-- 引入 Socket.io 客户端 -->
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <h1>🏰  Alicization Town V0.1.0</h1>
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <script>
    const socket = io();
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const TILE_SIZE = 40; // 每个格子 40 像素
    let players = {};

    // 接收服务器的状态更新
    socket.on('stateUpdate', (serverPlayers) => {
      players = serverPlayers;
      draw(); // 收到新数据就重新画一帧
    });

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height); // 清空画布
      
      // 画网格线（为了好看）
      ctx.strokeStyle = '#60a3bc';
      for(let i=0; i<800; i+=TILE_SIZE) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,600); ctx.stroke(); }
      for(let i=0; i<600; i+=TILE_SIZE) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(800,i); ctx.stroke(); }

      // 画所有玩家
      for (const id in players) {
        const p = players[id];
        const screenX = p.x * TILE_SIZE;
        const screenY = p.y * TILE_SIZE;

        // 1. 画小人（蓝色方块）
        ctx.fillStyle = '#3498db';
        ctx.fillRect(screenX + 5, screenY + 5, 30, 30);

        // 2. 画名字
        ctx.fillStyle = 'black';
        ctx.font = '14px Arial';
        ctx.fillText(p.name, screenX, screenY - 5);

        // 3. 画聊天气泡
        if (p.message) {
          ctx.fillStyle = 'white';
          ctx.fillRect(screenX, screenY - 45, 120, 30);
          ctx.fillStyle = 'black';
          ctx.fillText(p.message.substring(0, 10) + '...', screenX + 5, screenY - 25);
        }
      }
    }
  </script>
</body>
</html>
